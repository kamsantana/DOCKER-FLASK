version: '3.8'

services:
  kevin:
    image: ghcr.io/kamsantana/docker-flask:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - webpublica
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        # Cambiado entrypoint de http a web (así está configurado en tu VPS)
        - "traefik.http.routers.kevin.entrypoints=web"
        # CORREGIDO: Añadidas las comillas invertidas ` ` en el Host
        - "traefik.http.routers.kevin.rule=Host(`kevin.byronrm.com`)"
        
        # Configuración de redirección segura SSL (HTTPS)
        - "traefik.http.middlewares.kevin-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.kevin.middlewares=kevin-https-redirect"
        - "traefik.http.routers.kevin-secure.entrypoints=https"
        # CORREGIDO: Añadidas las comillas invertidas ` ` aquí también
        - "traefik.http.routers.kevin-secure.rule=Host(`kevin.byronrm.com`)"
        - "traefik.http.routers.kevin-secure.tls=true"
        - "traefik.http.routers.kevin-secure.tls.certresolver=http"
        - "traefik.http.routers.kevin-secure.service=kevin"
        
        # Puerto donde corre tu app interna de Flask
        - "traefik.http.services.kevin.loadbalancer.server.port=5000"
        - "traefik.docker.network=portainer_webpublica"

networks:
  webpublica:
    external: true
    name: portainer_webpublica