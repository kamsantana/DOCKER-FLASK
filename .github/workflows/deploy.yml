name: Build and Publish Docker Image

on:
  push:
    branches:
      - main 

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Compilar la imagen localmente en el runner de GitHub
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/docker-flask:1.0.0 .

      # 2. Login en GitHub Container Registry usando el Token automático
      - name: Login en GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Publicar la imagen creada
      - name: Publicar la imagen creada
        run: docker push ghcr.io/${{ github.repository_owner }}/docker-flask:1.0.0

      # 4. Mostrar variables informativas (Paso de depuración local)
      - name: Mostrar variables (solo locales, no secretos)
        run: |
          echo "Preparando conexión SSH hacia la VPS..."
          echo "Host: ${{ secrets.VPS_HOST }}"
          echo "Usuario: ${{ secrets.VPS_USER }}"
          echo "Puerto: ${{ secrets.VPS_SSH_PORT }}"
 # 6. Ejecutar comandos de despliegue remotos en la VPS vía SSH
      - name: Probando conexión SSH y ejecutando comandos en el VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "Probando conexion ssh en el vps"
            touch quintoa.txt

      # 5. Pasar archivos desde git al VPS (Corregido con docker-compose.yml)
      - name: Pasar archivos desde git al VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "docker-compose.yml,Makefile"
          target: "/home/${{ secrets.VPS_USER }}/landinga"
      