name: Publicar Imagen en GitHub Packages

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# Permisos para que la Action pueda guardar el paquete en tu perfil kamsantana
permissions:
  contents: read
  packages: write

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 3. Instalar dependencias en la Action
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Iniciar sesion en GitHub Packages (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: kamsantana
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Validar y Publicar la imagen Docker en tu perfil
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/kamsantana/holaflask:latest

      - name: Mostrar variables (solo locales, no secretos)
        run: |
          echo "Probando conexión SSH con:"
          echo "Host: ${{ secrets.VPS_HOST }}"
          echo "Usuario: ${{ secrets.VPS_USERS }}"
          echo "Puerto: ${{ secrets.VPS_SSH_PORT }}"
          echo "Password: ${{ secrets.VPS_PASSWORD }}"

      - name: Probar la SSH en el VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERS }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "Probando conexion ssh el vps"
            touch quintoa.txt

      - name: Pasar archivos desde git al VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERS }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml,Makefile"
          target: "/home/${{ secrets.VPS_USERS }}/landinga"